<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ClawBudget{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="/" class="brand-link">ClawBudget</a>
    </div>

    <nav class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/sessions">Sessions</a>
    </nav>

    <div class="tag">Monitor, alert, cut</div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
